<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRL</title>
    <link rel="stylesheet" href="style.css">
	<script src="simpleParallax.min.js"></script>
</head>
<body>

<h1>Hello SRL</h1>
<h2>Have Some Fun</h2>
<div class="box">
  <img class="thumbnail" src="Image1.heic" alt="image">
</div>

<h1>Right</h1>
<h2>1</h2>
<div class="box">
  <img class="thumbnail1" src="Image1.heic" alt="image">
</div>
<script>
var image1 = document.getElementsByClassName('thumbnail1');
new simpleParallax(image1, {
	orientation: 'right'
});
</script>

<h1>Up</h1>
<h2>2</h2>
<div class="box">
<img class="thumbnail2" src="Image1.heic" alt="image">
</div>
<script>
var image2 = document.getElementsByClassName('thumbnail2');
new simpleParallax(image2, {
        orientation: 'up'
});
</script>

<h1>Up Left</h1>
<h2>3</h2>
<div class="box">
<img class="thumbnail3" src="Image1.heic" alt="image">
</div>
<script>
var image3 = document.getElementsByClassName('thumbnail3');
new simpleParallax(image3, {
        orientation: 'up left'
});
</script>

</body>
</html>
