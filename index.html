<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>SRL</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}
		html {
			font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
			color: #333;
		}
		h1 {
			margin: 100px 0 30px;
	        	font-size: 4rem;
			text-align: center;
		}
		p {
			font-size: 1.5rem;
			text-align: center;
		}
		
		<!-- simpleParallax -->
		.box {
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		.thumbnail {
			width: 100%;
		}
		
		<!-- Gallery -->
		.gallery {
			width: auto;
			display: flex;
			justify-content: center;
			gap: 5px;
		}
		.gallery img {
			width: 33%;
			height: auto;
		}
		@media (max-width: 768px) {
			.gallery {
				flex-direction: column;
				gap: 5px;
			}
			.gallery img {
				width: 100%;
			}
		}
	</style>

	<script src="js/simpleParallax.min.js"></script>
</head>

<body>
	<div class="box">
		<img class="thumbnail" src="images/SRL0_0.png">
	</div>
	
	<h1>Hi there!</h1>
	<div style="width: 560px; margin: 0 auto;">
		<iframe width="560" height="315" src="https://www.youtube.com/embed/vbC6dm7OtCI?si=p35stVSoxggB7s5t&rel=0"></iframe>
	</div>
	
	<h1>...and here it is.</h1>
	<div style="width: 360px; margin: 0 auto;">
		<a href="https://apps.apple.com/app/id6758390275" target="_blank">
			<img src="images/Download_on_the_App_Store_Badge_US-UK_RGB_blk_092917.svg" width="360" height="120">
		</a>
	</div>

	<h1>Say something?</h1>
	<div style="width: 640px; margin: 0 auto;">
		<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScd9-XhhNzon2jqzU-HMmNxvrLqLucMSW6RYEEip9vZ8cR-rQ/viewform?embedded=true" width="640" height="621" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
	</div>
	
	<h1>Never worry.</h1>
	<p><span style="font-weight: bold;">Privacy Policy:</span> SRL does not collect, store, or access any of your personal data - ever.</p>
	
	<h1>Shot Your Fun.</h1>
	<div class="gallery">
		<img src="images/SRL0_1.jpeg">
		<img src="images/SRL0_2.jpeg">
		<img src="images/SRL0_3.jpeg">
	</div>

	<p style="margin: 100px 0 100px;">© Shoji Konishi</p>
	
	<!-- simpleParallax -->
	<script>
		var image = document.getElementsByClassName('thumbnail');
		new simpleParallax(image, {
        		orientation: 'right'
		});
	</script>

</body>
</html>
